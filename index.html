<!DOCTYPE html>
<html>
<head>
   <title>Volume Calculator</title>


    <style>
       body {
    margin: 0;
    font-family: Arial, sans-serif;

   
    background: linear-gradient(135deg, #e0eafc, #cfdef3);

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 300px;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 6px 0 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        #status {
            text-align: center;
            font-size: 13px;
            margin-top: 10px;
        }

        /* progress bar */
        .progress {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #007bff;
            transition: width 0.2s;
        }
    </style>
</head>
<img src=https://static.vecteezy.com/system/resources/thumbnails/026/812/783/small_2x/background-with-flowers-and-bubbles-vector.jpg
style="
width:100%;
height:100%;
position:fixed;
top:0;
left:0;
object-fit:cover;
object-position:left
;
z-index:-1;
">


<body>
<div class="container">
    <h1>📏 VOLUME CALCULATOR</h1>


    <label>Shape:</label>
    <select id="cmbShape"></select>

    <label>Samples:</label>
    <input type="number" id="txtSamples" value="1000">

    <label id="lblParam1"></label>
    <input type="text" id="txtParam1">

    <label id="lblParam2"></label>
    <input type="text" id="txtParam2">

    <button id="btnCalculate">Calculate</button>

    <div id="status"></div>

    <!-- progress bar -->
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
</div>

<script>
let isCalculating = false;
let cancelFlag = false;

const cmbShape = document.getElementById("cmbShape");
const txtSamples = document.getElementById("txtSamples");
const txtParam1 = document.getElementById("txtParam1");
const txtParam2 = document.getElementById("txtParam2");
const lblParam1 = document.getElementById("lblParam1");
const lblParam2 = document.getElementById("lblParam2");
const btnCalculate = document.getElementById("btnCalculate");
const status = document.getElementById("status");
const progressBar = document.getElementById("progressBar");

// Initialize
cmbShape.innerHTML = `
<option>Nautilus</option>
<option>Twisted Saddle</option>
<option>Blob Cluster</option>
`;
cmbShape.selectedIndex = 0;
updateParams();

cmbShape.onchange = updateParams;

function updateParams() {
    switch (cmbShape.selectedIndex) {
        case 0:
            lblParam1.innerText = "Radius scale";
            txtParam1.value = "1.0";
            lblParam2.innerText = "Z bound";
            txtParam2.value = "2.5";
            break;

        case 1:
            lblParam1.innerText = "Saddle depth";
            txtParam1.value = "0.8";
            lblParam2.innerText = "Twist factor";
            txtParam2.value = "1.2";
            break;

        case 2:
            lblParam1.innerText = "Blob count";
            txtParam1.value = "5";
            lblParam2.innerText = "Blob size";
            txtParam2.value = "0.9";
            break;
    }
}

btnCalculate.onclick = async function () {

    if (isCalculating) {
        cancelFlag = true;
        return;
    }

    let n = Number(txtSamples.value);
    let p1 = Number(txtParam1.value);
    let p2 = Number(txtParam2.value);

    if (!n || !p1 || !p2) {
        alert("Enter valid values");
        return;
    }

    isCalculating = true;
    cancelFlag = false;
    btnCalculate.innerText = "Cancel";
    status.innerText = "Calculating...";
    progressBar.style.width = "0%";

    try {
        let result = await runCalc(n, p1, p2, cmbShape.selectedIndex);
        alert("Processed " + result.count + "\nVolume: " + result.volume);
    } catch {
        alert("Cancelled");
    }

    isCalculating = false;
    btnCalculate.innerText = "Calculate";
    status.innerText = "";
    progressBar.style.width = "0%";
};

async function runCalc(n, p1, p2, shape) {

    let processed = 0;

    for (let i = 1; i <= n; i++) {

        if (cancelFlag) throw "cancel";

        for (let j = 1; j <= 100; j++) {
            Math.sqrt(j) * Math.sin(j);
        }

        processed = i;

        if (i % 100 === 0) {
            let percent = (i / n) * 100;
            progressBar.style.width = percent + "%";
            status.innerText = "Processing: " + i + " / " + n;

            await new Promise(r => setTimeout(r, 0));
        }
    }

    let volume = 0;

    switch (shape) {
        case 0:
            volume = Math.PI * p1 * p1 * p2;
            break;
        case 1:
            volume = (4 * p1) * p2;
            break;
        case 2:
            volume = Math.round(p1) * (4/3) * Math.PI * p2 * p2 * p2;
            break;
    }

    return {
        count: processed,
        volume: volume.toFixed(6)
    };
}
</script>

</body>
</html>
